{% load form_extras %}
{% load static %}
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Transaction</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@3.3.0/dist/tailwind.min.css" rel="stylesheet">
    <script src="https://unpkg.com/htmx.org@1.9.2"></script>
</head>
<body class="bg-light">
    <div class="container mt-5">
        <h1 class="text-center text-primary mb-4">Update Transaction</h1>
        <div class="card shadow-sm p-4 rounded-4">
            <form method="post" hx-post="{% url 'update_transaction' transaction.pk %}">
                {% csrf_token %}
                <!-- Include the transaction form -->
                {% include 'expenses/partials/transaction_form.html' %}
                <div class="d-flex justify-content-between mt-4">
                    <a href="{% url 'transactions' %}" class="btn btn-secondary">Back to Transactions</a>
                    <button type="submit" class="btn btn-primary">Save Changes</button>
                </div>
            </form>
        </div>
    </div>
</body>
