<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transaction Success</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            font-family: Arial, sans-serif;
        }
        .success-container {
            max-width: 500px;
            margin: 50px auto;
            text-align: center;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        .btn-container {
            margin-top: 20px;
        }
        .btn {
            width: 100%;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="success-container">
        <h1 class="text-success">Transaction Updated Successfully!</h1>
        <p class="text-muted">You can either modify this transaction again or view all transactions.</p>

        <div class="btn-container">
            <!-- Modify Again Button -->
            <a href="{% url 'update_transaction' transaction.pk %}" class="btn btn-primary">Modify Again</a>

            <!-- View All Transactions Button -->
            <a href="{% url 'transactions' %}" class="btn btn-secondary">View All Transactions</a>
        </div>
    </div>
</body>
</html>
